<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORE!FEIT</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght=400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0f0f0f;
    --white: #f5f5f0;
    --green: #3B6D11;
    --green-light: #639922;
    --green-dark: #27500A;
    --gray: #1e1e1e;
    --gray-mid: #2e2e2e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 16px;
    line-height: 1.7;
  }

  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--black);
    border-bottom: 1px solid var(--green-dark);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    height: 60px;
  }

  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: var(--white);
    letter-spacing: 2px;
  }

  .nav-logo span { color: var(--green-light); }

  .nav-dropdown-container {
    position: relative;
    display: inline-block;
  }

  .nav-select {
    background: var(--gray);
    color: var(--white);
    border: 1px solid var(--green-dark);
    padding: 0.4rem 1.5rem 0.4rem 0.75rem;
    font-family: 'Barlow', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-radius: 4px;
    cursor: pointer;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
  }

  .nav-select:focus {
    border-color: var(--green-light);
  }

  .nav-dropdown-container::after {
    content: '▼';
    font-size: 0.6rem;
    color: var(--green-light);
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
  }

  .page { display: none; }
  .page.active { display: block; }

  .hero-black {
    background: var(--black);
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 5rem 2rem 4rem;
    position: relative;
    overflow: hidden;
  }

  .hero-black::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, #27500a33 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 18vw, 12rem);
    letter-spacing: 4px;
    line-height: 1;
    color: var(--white);
    position: relative;
  }

  .hero-title span { color: var(--green-light); }

  .hero-tagline {
    font-size: 1rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--green-light);
    margin-top: 1.5rem;
    opacity: 0.85;
    position: relative;
  }

  .hero-white {
    background: #f0efe8;
    padding: 5rem 2rem;
  }

  .hero-white-inner {
    max-width: 900px;
    margin: 0 auto;
  }

  .hero-white .section-label { color: var(--green-light); }
  .hero-white .section-title { color: #0f0f0f; font-family: 'Bebas Neue', sans-serif; }
  .hero-white .section-body { color: #444; }

  .hero-divider-bar {
    width: 100%;
    height: 3px;
    background: linear-gradient(to right, transparent, var(--green), transparent);
  }

  section {
    padding: 5rem 2rem;
    max-width: 900px;
    margin: 0 auto;
    border-bottom: 1px solid #1a1a1a;
  }

  section:last-child { border-bottom: none; }

  .section-label {
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--green-light);
    margin-bottom: 1rem;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    letter-spacing: 2px;
    color: var(--white);
    margin-bottom: 1.5rem;
    line-height: 1.1;
  }

  .section-body {
    color: rgba(245,245,240,0.65);
    font-size: 1rem;
    line-height: 1.9;
    max-width: 680px;
  }

  .section-body p + p { margin-top: 1rem; }

  .deck-tabs {
    display: flex;
    width: 100%;
    margin-bottom: 0;
    border-radius: 6px 6px 0 0;
    overflow: hidden;
  }

  .deck-tab {
    flex: 1;
    padding: 0.85rem 1rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    border: none;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
  }

  .deck-tab.black-tab {
    background: #111;
    color: rgba(245,245,240,0.4);
    border: 1px solid #333;
    border-bottom: none;
  }

  .deck-tab.black-tab.active { color: var(--white); border-color: #444; background: #1a1a1a; }

  .deck-tab.white-tab {
    background: #ccc;
    color: #666;
    border: 1px solid #aaa;
    border-bottom: none;
  }

  .deck-tab.white-tab.active { background: #f0efe8; color: #0f0f0f; border-color: #bbb; }

  .deck-panel { display: none; }
  .page.active .deck-panel.active { display: block; }

  .black-panel {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 0 0 8px 8px;
    padding: 2.5rem;
  }

  .white-panel {
    background: #f0efe8;
    border: 1px solid #ccc;
    border-radius: 0 0 8px 8px;
    padding: 2.5rem;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1.5rem;
    margin-top: 1.5rem;
  }

  .card {
    cursor: pointer;
    border-radius: 8px;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
    text-decoration: none;
    display: block;
  }

  .card.dark-card { background: var(--gray); border: 1px solid var(--gray-mid); }
  .card.dark-card:hover { transform: translateY(-4px); border-color: var(--green); }
  .card.light-card { background: #e8e8e0; border: 1px solid #bbb; }
  .card.light-card:hover { transform: translateY(-4px); border-color: var(--green); }

  .card-img {
    width: 100%;
    aspect-ratio: 3/4;
    overflow: hidden;
    display: block;
  }

  .card-img img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .dark-card .card-img { background: var(--gray-mid); border-bottom: 1px solid #2a2a2a; }
  .light-card .card-img { background: #d8d8d0; border-bottom: 1px solid #ccc; }

  .card-body { padding: 1rem 1.25rem; }

  .card-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 1px;
    margin-bottom: 0.35rem;
  }

  .dark-card .card-name { color: var(--white); }
  .light-card .card-name { color: #0f0f0f; }

  .card-tag {
    display: inline-block;
    margin-top: 0.75rem;
    font-size: 0.7rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 12px;
    border-radius: 20px;
    font-weight: 600;
  }

  .card-tag.negative { border: 1px solid #4a1a1a; color: #c97070; background: #000; }
  .card-tag.positive { border: 1px solid var(--green); color: var(--green); background: #ffffff; }

  .tool-container {
    background: #141414;
    border: 1px solid #222;
    border-radius: 0 0 8px 8px;
    padding: 2.5rem;
  }

  .tool-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 1.5rem;
    align-items: flex-end;
    margin-bottom: 1.5rem;
  }

  .tool-field {
    flex: 1;
    min-width: 200px;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .tool-field label {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--green-light);
    font-weight: 600;
  }

  .tool-input {
    background: #1e1e1e;
    border: 1px solid #333;
    color: var(--white);
    padding: 0.75rem 1rem;
    font-family: 'Barlow', sans-serif;
    font-size: 0.95rem;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .tool-input:focus { border-color: var(--green-light); }

  .tool-btn-group {
    display: flex;
    gap: 1rem;
    margin-top: 1rem;
  }

  .tool-btn {
    background: var(--green);
    color: var(--white);
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 1px;
    padding: 0.75rem 1.5rem;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.2s;
    text-transform: uppercase;
  }

  .tool-btn:hover { background: var(--green-light); }
  .tool-btn.secondary { background: #2e2e2e; border: 1px solid #444; }
  .tool-btn.secondary:hover { background: #3e3e3e; }

  .results-box {
    background: #0f0f0f;
    border: 1px solid #222;
    border-radius: 4px;
    padding: 1.5rem;
    min-height: 100px;
    color: var(--white);
    font-size: 1.1rem;
    line-height: 1.8;
  }

  .builder-subheading {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 1px;
    font-size: 1.2rem;
    margin: 0 0 0.5rem;
    text-transform: uppercase;
    opacity: 0.9;
  }

  .selector-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 0.75rem;
    border-radius: 6px;
    padding: 1rem;
  }

  .selector-item {
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0.6rem 1rem;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  
  .selector-item input { display: none; }

  .wrapper-consequence {
    background: #0f0f0f;
    padding: 1.25rem;
    border-radius: 6px;
    border: 1px solid #222;
    margin-bottom: 1.5rem;
  }
  .wrapper-consequence .builder-subheading {
    color: var(--white);
  }
  .bg-consequence {
    background: #141414;
    border: 1px solid #222;
  }
  .bg-consequence .selector-item {
    background: #1e1e1e;
    border: 1px solid #333;
    color: var(--white);
  }
  .bg-consequence .selector-item:hover {
    background: #262626;
    border-color: #444;
  }
  .bg-consequence .selector-item.selected {
    border-color: #8c3535;
    background: #2a1616;
    color: #e59999;
  }

  .wrapper-reward {
    background: #f0efe8;
    padding: 1.25rem;
    border-radius: 6px;
    border: 1px solid #ccc;
    margin-bottom: 1.5rem;
  }
  .wrapper-reward .builder-subheading {
    color: #0f0f0f;
  }
  .bg-reward {
    background: #e4e3dc;
    border: 1px solid #bbb;
  }
  .bg-reward .selector-item {
    background: #ffffff;
    border: 1px solid #bbb;
    color: #0f0f0f;
  }
  .bg-reward .selector-item:hover {
    background: #fcfcfc;
    border-color: #999;
  }
  .bg-reward .selector-item.selected {
    border-color: var(--green);
    background: #e2f0d9;
    color: #0f0f0f;
  }

  .
