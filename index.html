<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORE!FEIT</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght=400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0f0f0f;
    --white: #f5f5f0;
    --green: #3B6D11;
    --green-light: #639922;
    --green-dark: #27500A;
    --gray: #1e1e1e;
    --gray-mid: #2e2e2e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 16px;
    line-height: 1.7;
  }

  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--black);
    border-bottom: 1px solid var(--green-dark);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    height: 60px;
  }

  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: var(--white);
    letter-spacing: 2px;
  }

  .nav-logo span { color: var(--green-light); }

  .nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
  }

  .nav-links a {
    color: var(--white);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0.7;
    transition: opacity 0.2s, color 0.2s;
  }

  .nav-links a:hover,
  .nav-links a.active {
    opacity: 1;
    color: var(--green-light);
  }

  .page { display: none; }
  .page.active { display: block; }

  /* SPLIT HERO — black top, white bottom */
  .hero-black {
    background: var(--black);
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 5rem 2rem 4rem;
    position: relative;
    overflow: hidden;
  }

  .hero-black::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, #27500a33 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 18vw, 12rem);
    letter-spacing: 4px;
    line-height: 1;
    color: var(--white);
    position: relative;
  }

  .hero-title span { color: var(--green-light); }

  .hero-tagline {
    font-size: 1rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--green-light);
    margin-top: 1.5rem;
    opacity: 0.85;
    position: relative;
  }

  .hero-white {
    background: #f0efe8;
    padding: 5rem 2rem;
  }

  .hero-white-inner {
    max-width: 900px;
    margin: 0 auto;
  }

  .hero-white .section-label { color: var(--green-light); }
  .hero-white .section-title { color: #0f0f0f; }
  .hero-white .section-body { color: #444; }

  /* DIVIDER between hero halves */
  .hero-divider-bar {
    width: 100%;
    height: 3px;
    background: linear-gradient(to right, transparent, var(--green), transparent);
  }

  /* SECTIONS */
  section {
    padding: 5rem 2rem;
    max-width: 900px;
    margin: 0 auto;
    border-bottom: 1px solid #1a1a1a;
  }

  section:last-child { border-bottom: none; }

  .section-label {
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--green-light);
    margin-bottom: 1rem;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    letter-spacing: 2px;
    color: var(--white);
    margin-bottom: 1.5rem;
    line-height: 1.1;
  }

  .section-body {
    color: rgba(245,245,240,0.65);
    font-size: 1rem;
    line-height: 1.9;
    max-width: 680px;
  }

  .section-body p + p { margin-top: 1rem; }

  /* DECK TOGGLE TABS — full width */
  .deck-tabs {
    display: flex;
    width: 100%;
    margin-bottom: 0;
    border-radius: 6px 6px 0 0;
    overflow: hidden;
  }

  .deck-tab {
    flex: 1;
    padding: 0.85rem 1rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    border: none;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
  }

  .deck-tab.black-tab {
    background: #111;
    color: rgba(245,245,240,0.4);
    border: 1px solid #333;
    border-bottom: none;
  }

  .deck-tab.black-tab.active { color: var(--white); border-color: #444; }

  .deck-tab.white-tab {
    background: #ccc;
    color: #666;
    border: 1px solid #aaa;
    border-bottom: none;
  }

  .deck-tab.white-tab.active { background: #f0efe8; color: #0f0f0f; border-color: #bbb; }

  /* DECK PANELS */
  .deck-panel { display: none; }
  .deck-panel.active { display: block; }

  .black-panel {
    background: #111;
    border: 1px solid #333;
    border-radius: 0 0 8px 8px;
    padding: 2.5rem;
  }

  .white-panel {
    background: #f0efe8;
    border: 1px solid #ccc;
    border-radius: 0 0 8px 8px;
    padding: 2.5rem;
  }

  .black-panel .deck-panel-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 2px;
    color: var(--white);
    margin-bottom: 0.5rem;
  }

  .black-panel .deck-panel-body { color: rgba(245,245,240,0.6); font-size: 0.95rem; line-height: 1.8; margin-bottom: 1.5rem; }

  .white-panel .deck-panel-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 2px;
    color: #0f0f0f;
    margin-bottom: 0.5rem;
  }

  .white-panel .deck-panel-body { color: #555; font-size: 0.95rem; line-height: 1.8; margin-bottom: 1.5rem; }

  /* CARD GRID */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1.5rem;
    margin-top: 1.5rem;
  }

  .card {
    cursor:pointer;
    border-radius: 8px;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }

  .card.dark-card { background: var(--gray); border: 1px solid var(--gray-mid); }
  .card.dark-card:hover { transform: translateY(-4px); border-color: var(--green); }
  .card.light-card { background: #e8e8e0; border: 1px solid #bbb; }
  .card.light-card:hover { transform: translateY(-4px); border-color: var(--green); }

  .card-img {
    width: 100%;
    aspect-ratio: 3/4;
    overflow: hidden;
    display: block;
  }

  .card-img img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .dark-card .card-img { background: var(--gray-mid); color: rgba(245,245,240,0.2); border-bottom: 1px solid #2a2a2a; }
  .light-card .card-img { background: #d8d8d0; color: rgba(0,0,0,0.25); border-bottom: 1px solid #ccc; }

  .card-body { padding: 1rem 1.25rem; }

  .card-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 1px;
    margin-bottom: 0.35rem;
  }

  .dark-card .card-name { color: var(--white); }
  .light-card .card-name { color: #0f0f0f; }

  .card-trigger {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 0.5rem;
  }

  .dark-card .card-trigger { color: var(--green-light); }
  .light-card .card-trigger { color: var(--green); }

  .card-desc { font-size: 0.85rem; line-height: 1.6; }
  .dark-card
